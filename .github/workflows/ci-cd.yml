name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: shubhamsinghs2/codemask

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build → Scan → Push
  # ─────────────────────────────────────────────
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for SARIF upload to Security tab
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Trivy scan (table output in logs)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # never block pipeline on scan failures
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Trivy scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true   # never block pipeline on scan failures
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Check SARIF file exists
        id: sarif_check
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "SARIF file not found — skipping upload, pipeline continues"
          fi

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && steps.sarif_check.outputs.exists == 'true'
        continue-on-error: true   # don't fail pipeline if SARIF upload has issues
        with:
          sarif_file: trivy-results.sarif

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image to Docker Hub
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Print pushed image
        run: echo "Pushed ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}"

  # ─────────────────────────────────────────────
  # JOB 2: Update GitOps repo (deployment.yaml)
  # ─────────────────────────────────────────────
  update-manifests:
    name: Update K8s Manifests (GitOps)
    runs-on: ubuntu-latest
    needs: build-scan-push

    steps:
      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout codemask-gitops repo
        uses: actions/checkout@v4
        with:
          repository: shubham-singhS2/codemask-gitops
          token: ${{ secrets.GH_PAT }}
          path: codemask-gitops

      - name: Update image tag in deployment.yaml
        run: |
          cd codemask-gitops
          sed -i "s|image: .*codemask:.*|image: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }}|g" deployment.yaml
          cat deployment.yaml

      - name: Commit and push
        run: |
          cd codemask-gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "deploy: codemask:${{ steps.tag.outputs.sha }}"
          git push
